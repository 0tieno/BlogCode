spring.application.name=05-secured-todo-api
server.port=8084

spring.datasource.url=jdbc:h2:mem:secureddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ??????????????????????????????????????????????????????????????????????????????
# CONCEPT: Externalising Secrets ? never commit real secrets to git
#
# The value below is a PLACEHOLDER for local development only.
# In a real project you NEVER store real secrets in application.properties
# because this file is committed to git ? visible to everyone.
#
# The industry-standard approach is to use ENVIRONMENT VARIABLES:
#
#   1. Set the env var on your machine or server:
#        Linux/macOS:  export JWT_SECRET=my-real-secret-key
#        Windows:      $env:JWT_SECRET="my-real-secret-key"
#
#   2. Reference it in application.properties using ${VAR_NAME}:
#        jwt.secret=${JWT_SECRET}
#
#   Spring reads the env var at startup. The file in git has no real value.
#
# For local development, you can use a .env file with a tool like Spring
# dotenv or just set the variable in your IDE run configuration.
# A .env.example file at the project root shows the required variable names ?
# see that file for the full list.
# ??????????????????????????????????????????????????????????????????????????????
# DEVELOPMENT ONLY ? replace with ${JWT_SECRET} env var in production!
jwt.secret=this-is-a-learning-project-secret-key-change-it-in-production!
jwt.expiration-ms=86400000

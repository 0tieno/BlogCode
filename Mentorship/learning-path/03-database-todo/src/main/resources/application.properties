spring.application.name=03-database-todo
server.port=8082

# ??????????????????????????????????????????????????????????????????????????????
# H2 IN-MEMORY DATABASE CONFIGURATION
# ??????????????????????????????????????????????????????????????????????????????

# H2 stores everything in memory ? no files on disk
spring.datasource.url=jdbc:h2:mem:tododb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable the H2 browser console at http://localhost:8082/h2-console
# Use this to see your tables and run SQL queries while the app is running
spring.h2.console.enabled=true

# ??????????????????????????????????????????????????????????????????????????????
# JPA CONFIGURATION
# ??????????????????????????????????????????????????????????????????????????????

# ddl-auto options:
#   create      ? drops and recreates tables on every startup (fresh start)
#   update      ? updates schema if needed, keeps existing data  ? we use this in dev
#   validate    ? checks schema matches entities, crashes if not ? use in production
#   none        ? do nothing                                     ? use in production with migrations
spring.jpa.hibernate.ddl-auto=create-drop

# show-sql=true prints every SQL query to the console ? useful for learning!
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ??????????????????????????????????????????????????????????????????????????????
# HOW TO SWITCH TO POSTGRESQL (when you're ready)
# Just replace the 3 lines above with:
#   spring.datasource.url=jdbc:postgresql://localhost:5432/tododb
#   spring.datasource.username=postgres
#   spring.datasource.password=yourpassword
#   spring.datasource.driver-class-name=org.postgresql.Driver
# And add the postgresql dependency in pom.xml. That's it!
# ??????????????????????????????????????????????????????????????????????????????


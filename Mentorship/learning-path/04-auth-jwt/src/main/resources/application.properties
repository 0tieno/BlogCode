spring.application.name=04-auth-jwt
server.port=8083

spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ??????????????????????????????????????????????????????????????????????????????
# JWT CONFIGURATION
#
# The secret key is used to sign and verify tokens.
# Rules:
#   - Must be at least 32 characters (256 bits) for HMAC-SHA256
#   - Must be KEPT SECRET ? never commit a real secret to git
#   - In production, use an environment variable: jwt.secret=${JWT_SECRET}
# ??????????????????????????????????????????????????????????????????????????????
jwt.secret=this-is-a-learning-project-secret-key-change-it-in-production!
jwt.expiration-ms=86400000

